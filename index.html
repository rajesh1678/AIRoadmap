<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0a0a">
<title>Python → AI Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0a;color:#c8c0b0;font-family:'DM Mono',monospace;min-height:100vh;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{padding-bottom:80px}

.hdr{position:sticky;top:0;z-index:100;background:#0a0a0a;border-bottom:1px solid #1a1a1a;padding:20px 16px 14px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5.5vw,36px);letter-spacing:3px;line-height:1;color:#f0ece3}
.hdr-sub{font-size:10px;color:#555;margin-top:5px;letter-spacing:2px}
.hdr-pct{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,46px);line-height:1;text-align:right;transition:color .3s}
.hdr-done{font-size:10px;color:#555;letter-spacing:1px;text-align:right;margin-top:3px}
.progress-bar{margin-top:12px;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#e63946,#f4a261);border-radius:2px;transition:width .4s ease}
.filters{display:flex;gap:8px;margin-top:12px}
.filter-btn{padding:4px 12px;border-radius:2px;border:1px solid #2a2a2a;background:transparent;color:#555;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.filter-btn.active{background:#f0ece3;color:#0a0a0a;border-color:#f0ece3}

.content{max-width:720px;margin:0 auto;padding:16px 12px}

.block{margin-bottom:2px;border:1px solid #1a1a1a}
.block-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;background:#0a0a0a;transition:background .15s}
.block-hdr.open{background:#0f0f0f}
.block-hdr:active{background:#111}
.block-left{display:flex;align-items:center;gap:12px;overflow:hidden}
.block-tag{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;flex-shrink:0}
.block-name{font-size:12px;color:#c8c0b0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:8px}
.block-count{font-size:10px;color:#555;letter-spacing:.5px;white-space:nowrap}
.mini-bar{width:44px;height:2px;background:#1a1a1a;border-radius:1px;flex-shrink:0}
.mini-fill{height:100%;border-radius:1px;transition:width .3s}
.chevron{font-size:9px;color:#333;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

.items{padding:4px 0 10px}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;cursor:pointer;transition:background .1s}
.item:active{background:#111}
.checkbox{margin-top:2px;width:14px;height:14px;flex-shrink:0;border:1.5px solid #2a2a2a;border-radius:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.checkbox.checked{border-color:currentColor}
.item-num{font-size:9px;color:#333;min-width:18px;margin-top:3px;letter-spacing:.5px;flex-shrink:0}
.item-text{font-size:12px;line-height:1.6;color:#c8c0b0;transition:color .15s}
.item-text.done{color:#282828;text-decoration:line-through}

.footer{margin-top:32px;padding:18px 14px;border:1px solid #1a1a1a;border-left:3px solid #333}
.footer-label{font-size:10px;color:#555;letter-spacing:1.5px;margin-bottom:10px}
.footer-line{font-size:11.5px;color:#444;line-height:2.1}
.footer-warn{color:#e63946;font-size:11px;margin-top:10px}

.tip{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:200;font-size:11px;color:#555}
.tip b{color:#c8c0b0}
.tip-close{background:none;border:none;color:#444;font-size:20px;cursor:pointer;line-height:1;padding:0 2px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">PYTHON → AI ENGINEER</div>
      <div class="hdr-sub">147 LANDMARKS · FAST TRACK</div>
    </div>
    <div>
      <div class="hdr-pct" id="pct" style="color:#e63946">0%</div>
      <div class="hdr-done" id="donelabel">0 / 147 DONE</div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">PENDING</button>
    <button class="filter-btn" onclick="setFilter('done',this)">DONE</button>
  </div>
</div>

<div class="content" id="app"></div>

<div class="tip" id="tip">
  <span>📌 <b>Add to Home Screen</b> → Chrome menu → "Add to Home screen"</span>
  <button class="tip-close" onclick="this.parentElement.style.display='none'">×</button>
</div>

const TOTAL=B.reduce((s,b)=>s+b.items.length,0);
let checked={},expanded={b1:true},filter='all';

function load(){try{const d=localStorage.getItem('pyroad');if(d)checked=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem('pyroad',JSON.stringify(checked));}catch(e){}}

function updateHeader(){
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round(done/TOTAL*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('pct').style.color=pct===100?'#2a9d8f':'#e63946';
  document.getElementById('donelabel').textContent=done+' / '+TOTAL+' DONE';
  document.getElementById('pfill').style.width=pct+'%';
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleBlock(id){
  expanded[id]=!expanded[id];
  const hdr=document.querySelector(`[data-block="${id}"] .block-hdr`);
  const chev=document.querySelector(`[data-block="${id}"] .chevron`);
  const itemsEl=document.querySelector(`[data-block="${id}"] .items`);
  if(expanded[id]){
    hdr.classList.add('open');chev.classList.add('open');
    if(!itemsEl){renderItems(id);}else{itemsEl.style.display='';}
  } else {
    hdr.classList.remove('open');chev.classList.remove('open');
    if(itemsEl) itemsEl.style.display='none';
  }
}

function renderItems(blockId){
  const block=B.find(b=>b.id===blockId);
  const blockEl=document.querySelector(`[data-block="${blockId}"]`);
  const div=document.createElement('div');
  div.className='items';
  block.items.forEach((item,i)=>{
    const key=`${block.id}-${i}`;
    if(filter==='done'&&!checked[key])return;
    if(filter==='pending'&&checked[key])return;
    const isDone=checked[key];
    const row=document.createElement('div');
    row.className='item';row.dataset.key=key;
    row.onclick=()=>toggleItem(key);
    row.innerHTML=`
      <div class="checkbox ${isDone?'checked':''}" style="${isDone?`background:${block.c};border-color:${block.c}`:`border-color:#2a2a2a`}">
        <svg width="8" height="6" viewBox="0 0 8 6" fill="none" style="display:${isDone?'block':'none'}">
          <path d="M1 3L3 5L7 1" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="item-num">${String(i+1).padStart(2,'0')}</span>
      <span class="item-text ${isDone?'done':''}">${item}</span>`;
    div.appendChild(row);
  });
  blockEl.appendChild(div);
}

function toggleItem(key){
  checked[key]=!checked[key];
  save();updateHeader();
  const row=document.querySelector(`[data-key="${key}"]`);
  if(!row)return;
  const blockId=key.split('-').slice(0,-1).join('-');
  const block=B.find(b=>b.id===blockId);
  const cb=row.querySelector('.checkbox');
  const txt=row.querySelector('.item-text');
  const svg=row.querySelector('svg');
  if(checked[key]){
    cb.classList.add('checked');cb.style.background=block.c;cb.style.borderColor=block.c;
    txt.classList.add('done');if(svg)svg.style.display='block';
  } else {
    cb.classList.remove('checked');cb.style.background='';cb.style.borderColor='#2a2a2a';
    txt.classList.remove('done');if(svg)svg.style.display='none';
  }
  const done=block.items.filter((_,i)=>checked[`${block.id}-${i}`]).length;
  const pct=Math.round(done/block.items.length*100);
  const mf=document.querySelector(`[data-block="${blockId}"] .mini-fill`);
  const bc=document.querySelector(`[data-block="${blockId}"] .block-count`);
  if(mf)mf.style.width=pct+'%';
  if(bc)bc.textContent=done+'/'+block.items.length;
  if(filter!=='all'){
    row.style.opacity='0';row.style.transition='opacity .2s';
    setTimeout(()=>{row.remove();},200);
  }
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  B.forEach(block=>{
    const done=block.items.filter((_,i)=>checked[`${block.id}-${i}`]).length;
    const total=block.items.length;
    const pct=Math.round(done/total*100);
    const isOpen=expanded[block.id];
    if(filter!=='all'){
      const vis=block.items.filter((_,i)=>{
        const k=`${block.id}-${i}`;
        return filter==='done'?checked[k]:!checked[k];
      });
      if(vis.length===0)return;
    }
    const div=document.createElement('div');
    div.className='block';div.dataset.block=block.id;
    div.style.borderLeftColor=block.c;
    div.innerHTML=`
      <div class="block-hdr ${isOpen?'open':''}" onclick="toggleBlock('${block.id}')">
        <div class="block-left">
          <span class="block-tag" style="color:${block.c}">${block.t}</span>
          <span class="block-name">${block.s}</span>
        </div>
        <div class="block-right">
          <span class="block-count">${done}/${total}</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:${block.c}"></div></div>
          <span class="chevron ${isOpen?'open':''}">▼</span>
        </div>
      </div>`;
    app.appendChild(div);
    if(isOpen) renderItems(block.id);
  });

  const footer=document.createElement('div');
  footer.className='footer';
  footer.innerHTML=`
    <div class="footer-label">AFTER THIS →</div>
    <div class="footer-line">
      NumPy done? → Start Andrew Ng ML Course<br>
      Pandas done? → Build a real data project<br>
      All 15 blocks? → Jump into PyTorch + Scikit-learn
    </div>
    <div class="footer-warn">Don't finish Python before starting ML. Learn both together.</div>`;
  app.appendChild(footer);
  updateHeader();
}

load();render();
</script>
</body>
</html>
